name: Sync Soul Essence Calculator

# Keeps this repo's embedded copy of soul_essence_calculator.html in step with
# the MASTER file in the public BirdsLoMLab/RE13021169 repo
# (uploads/soul_essence_calculator.html).
#
# Pull-based on purpose: RE13021169 is public, so this reads the master with no
# credentials, and it only ever commits to THIS repo using the built-in
# GITHUB_TOKEN. No personal access token or secret to set up.

on:
  schedule:
    - cron: '17 * * * *'      # hourly (at :17) — best-effort per GitHub
  workflow_dispatch:           # lets you sync on demand from the Actions tab

permissions:
  contents: write

concurrency:
  group: sync-soul-calculator
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout calcs
        uses: actions/checkout@v4

      - name: Fetch master from RE13021169
        run: |
          curl -fsSL --retry 4 --retry-delay 3 \
            "https://raw.githubusercontent.com/BirdsLoMLab/RE13021169/main/uploads/soul_essence_calculator.html" \
            -o soul_essence_calculator.new

      - name: Update embedded copy if it changed
        run: |
          if cmp -s soul_essence_calculator.new soul_essence_calculator.html; then
            echo "Already in sync — nothing to do."
            rm -f soul_essence_calculator.new
            echo "changed=false" >> "$GITHUB_ENV"
          else
            mv soul_essence_calculator.new soul_essence_calculator.html
            echo "Master changed — embedded copy updated."
            echo "changed=true" >> "$GITHUB_ENV"
          fi

      - name: Commit & push
        if: env.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add soul_essence_calculator.html
          git commit -m "Auto-sync Soul Essence Calculator from RE13021169 master"
          git push
